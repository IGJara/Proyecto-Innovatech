apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: innovatech
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: backend-ventas
  namespace: innovatech
spec:
  type: ClusterIP
  selector:
    app: backend-ventas
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-despachos
  namespace: innovatech
spec:
  type: ClusterIP
  selector:
    app: backend-despachos
  ports:
    - port: 8081
      targetPort: 8081
